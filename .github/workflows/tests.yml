name: Tests

on: [push, pull_request]

jobs:
  tests:
    name: PHP ${{ matrix.php }} tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        php: ["8.4"]

    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: xdebug
          coverage: xdebug

      - run: |
          composer install

      - name: Run tests
        run: composer phpunit
